<!DOCTYPE html>
<html>
<head>
  <title>Jac Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fa;
    }

    header {
      background: #111827;
      color: pink;
      padding: 20px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }

    .hero {
      text-align: center;
      padding: 60px 20px;
    }

    .hero h1 {
      font-size: 36px;
      margin-bottom: 10px;
      color: #111827;
    }

    .hero p {
      font-size: 18px;
      color: #555;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 25px;
      background: #2563eb;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-size: 16px;
    }

    .section {
      padding: 40px 20px;
      text-align: center;
    }

    .card {
      background: white;
      margin: 20px auto;
      padding: 20px;
      max-width: 300px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    footer {
      background: #111827;
      color: white;
      text-align: center;
      padding: 15px;
      margin-top: 40px;
    }
  </style>
</head>

<body>

<header>
  My Brand 🚀
</header>

<div class="hero">
  <h1>🔥 Amazing Product</h1>
  <p>Simple. Powerful. Worth it.</p>
  <a href="#" class="btn">Buy Now</a>
</div>

<div class="section">
  <h2>Why Choose This?</h2>

  <div class="card">
    <h3>High Quality</h3>
    <p>Built with premium materials.</p>
  </div>

  <div class="card">
    <h3>Affordable</h3>
    <p>Best value for your money.</p>
  </div>

  <div class="card">
    <h3>Fast Delivery</h3>
    <p>Get it quickly at your doorstep.</p>
  </div>
</div>

<footer>
  © 2026 My Brand
</footer>

</body>
</html>
